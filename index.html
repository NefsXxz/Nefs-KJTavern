<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>GridCanvas — Professional CSS Grid Builder</title>
    <!-- TailwindCSS (lightweight utility framework) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons (professional touch) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* custom smooth animations, dark mode base, grid overlay, resize handles */
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f17;
        }
        /* custom scroll */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e2430; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3a4458; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f5b73; }

        /* canvas viewport (pan/zoom) */
        .canvas-viewport {
            overflow: hidden;
            position: relative;
            background: #131824;
            border-radius: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 8px 20px rgba(0,0,0,0.5);
            cursor: grab;
            touch-action: none;  /* prevent scroll/pinch on canvas area — handled by JS */
        }
        .canvas-viewport.panning { cursor: grabbing; }
        .canvas-transform {
            transform-origin: 0 0;
            will-change: transform;
            transition: transform 0.05s ease-out;
        }
        .grid-stage {
            display: grid;
            position: relative;
            background-color: #1a1f2c;
            background-image: 
                linear-gradient(rgba(75, 130, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(75, 130, 255, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            min-width: 100%;
            min-height: 100%;
            transition: grid-template-columns 0.15s, grid-template-rows 0.15s, gap 0.15s;
        }
        /* grid items */
        .grid-item {
            position: relative;
            background: rgba(45, 140, 255, 0.85);
            backdrop-filter: blur(4px);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px 4px;
            word-break: break-word;
            cursor: move;
            transition: box-shadow 0.1s, background 0.1s;
            user-select: none;
            min-width: 40px;
            min-height: 40px;
            backdrop-filter: blur(8px);
        }
        .grid-item.selected {
            box-shadow: 0 0 0 3px #3b82f6, 0 10px 18px rgba(0,0,0,0.5);
            z-index: 10;
            border-color: #90caf9;
        }
        .grid-item[contenteditable="true"] {
            cursor: text;
            user-select: text;
            background: rgba(30, 50, 90, 0.9);
            outline: 2px solid #ffd966;
        }
        /* resize handles */
        .resize-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ffffff;
            border: 2px solid #1e88e5;
            border-radius: 8px;
            z-index: 30;
            pointer-events: auto;
            box-shadow: 0 2px 6px black;
            transition: 0.1s;
        }
        .resize-handle:hover { background: #90caf9; transform: scale(1.2); }
        .handle-nw { top: -7px; left: -7px; cursor: nw-resize; }
        .handle-ne { top: -7px; right: -7px; cursor: ne-resize; }
        .handle-sw { bottom: -7px; left: -7px; cursor: sw-resize; }
        .handle-se { bottom: -7px; right: -7px; cursor: se-resize; }

        /* canvas overlay for grid lines */
        .grid-overlay-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        /* panel styling */
        .control-panel {
            background: #111827dd;
            backdrop-filter: blur(16px);
            border: 1px solid #2d3a52;
            box-shadow: 0 20px 35px -8px #00000080;
        }
        button, .btn-style {
            transition: all 0.15s;
        }
        button:active { transform: scale(0.96); }
        input[type="color"] { background: #1e293b; border: 1px solid #3f4e6b; border-radius: 8px; height: 36px; }
        input, select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
        .breakpoint-active { background: #2563eb !important; box-shadow: 0 0 10px #3b82f6; }
        /* touch optimizations */
        .no-tap-highlight { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#0b0f17] text-gray-200 antialiased overflow-hidden h-screen w-screen flex flex-col">

<!-- TOP BAR (minimal) -->
<div class="flex items-center justify-between px-5 py-3 border-b border-gray-700/60 bg-[#0f1622]/90 backdrop-blur-sm">
    <div class="flex items-center gap-3">
        <i class="fas fa-th-large text-blue-400 text-xl"></i>
        <span class="font-semibold text-lg tracking-tight">GridCanvas <span class="text-xs bg-blue-900/40 px-2 py-1 rounded-full ml-2 text-blue-200">Pro</span></span>
    </div>
    <div class="flex gap-2 text-sm">
        <button id="saveLayoutBtn" class="bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg border border-gray-600"><i class="far fa-save mr-1"></i>Save</button>
        <button id="resetLayoutBtn" class="bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg border border-gray-600"><i class="fas fa-undo-alt mr-1"></i>Reset</button>
        <button id="exportBtn" class="bg-blue-800 hover:bg-blue-700 px-4 py-1.5 rounded-lg border border-blue-500"><i class="fas fa-code mr-1"></i>Export</button>
    </div>
</div>

<!-- MAIN WORKSPACE -->
<div class="flex flex-1 overflow-hidden relative">

    <!-- LEFT SIDEBAR: CONTROL PANEL (Pro UI) -->
    <div class="control-panel w-80 flex-shrink-0 overflow-y-auto p-4 flex flex-col gap-5 border-r border-gray-700/50 shadow-2xl z-10">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 flex items-center gap-2"><i class="fas fa-sliders-h"></i> Grid Settings</h3>
        
        <!-- Columns & Rows -->
        <div class="space-y-3">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Columns (e.g. 1fr 2fr 200px)</label>
                <input type="text" id="columnsInput" value="1fr 1fr 1fr" class="w-full p-2 rounded-lg text-sm font-mono bg-gray-800/70 border-gray-600">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Rows (e.g. 150px auto 1fr)</label>
                <input type="text" id="rowsInput" value="150px 150px 150px" class="w-full p-2 rounded-lg text-sm font-mono bg-gray-800/70 border-gray-600">
            </div>
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-xs text-gray-400">Gap</label>
                    <input type="number" id="gapInput" value="12" min="0" max="60" class="w-full p-2 rounded-lg text-sm">
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-gray-400">Unit</label>
                    <select id="gapUnit" class="w-full p-2 rounded-lg text-sm bg-gray-800/70">
                        <option value="px" selected>px</option>
                        <option value="%">%</option>
                        <option value="em">em</option>
                    </select>
                </div>
            </div>
            <button id="applyGridBtn" class="bg-blue-600 hover:bg-blue-500 w-full py-2 rounded-lg font-medium shadow-md"><i class="fas fa-check mr-1"></i>Apply Grid</button>
        </div>

        <hr class="border-gray-700">

        <!-- Snap & Overlay toggles -->
        <div class="space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-sm flex items-center gap-2"><i class="fas fa-magnet text-blue-300"></i>Snap to Grid</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="snapToggle" class="sr-only peer" checked>
                    <div class="w-10 h-5 bg-gray-600 peer-focus:ring-2 ring-blue-400 rounded-full peer peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-sm flex items-center gap-2"><i class="fas fa-border-all"></i>Grid Lines</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="gridLinesToggle" class="sr-only peer" checked>
                    <div class="w-10 h-5 bg-gray-600 peer-focus:ring-2 rounded-full peer peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div>
                <label class="text-xs">Line Color</label>
                <input type="color" id="lineColorPicker" value="#3b82f6" class="w-full h-9 rounded-lg">
            </div>
            <div>
                <label class="text-xs">Line Style</label>
                <select id="lineStyleSelect" class="w-full p-2 rounded-lg text-sm bg-gray-800/70">
                    <option value="solid">Solid</option>
                    <option value="dashed">Dashed</option>
                    <option value="dotted">Dotted</option>
                </select>
            </div>
        </div>

        <hr class="border-gray-700">

        <!-- Responsive Breakpoints -->
        <div>
            <h4 class="text-xs text-gray-400 mb-2"><i class="fas fa-mobile-alt mr-1"></i>Breakpoints</h4>
            <div class="flex gap-2">
                <button data-breakpoint="desktop" class="breakpoint-btn flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm breakpoint-active">Desktop</button>
                <button data-breakpoint="tablet" class="breakpoint-btn flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm">Tablet</button>
                <button data-breakpoint="mobile" class="breakpoint-btn flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm">Mobile</button>
            </div>
        </div>

        <hr class="border-gray-700">

        <!-- Zoom & Pan controls -->
        <div>
            <label class="text-xs flex items-center gap-1"><i class="fas fa-search"></i>Zoom <span id="zoomValue">100%</span></label>
            <input type="range" id="zoomSlider" min="30" max="200" value="100" class="w-full accent-blue-500">
        </div>

        <!-- Item editing (when selected) -->
        <div class="mt-2 bg-gray-800/40 p-3 rounded-xl">
            <p class="text-xs font-semibold mb-2"><i class="fas fa-pen"></i> Selected Item</p>
            <div id="itemEditor" class="space-y-2 hidden">
                <input type="text" id="itemContentInput" placeholder="Text content" class="w-full p-2 rounded text-sm">
                <div class="flex gap-2">
                    <input type="color" id="itemBgColor" value="#2d8cff" class="w-10 h-10 rounded border-0 p-1">
                    <button id="applyItemStyle" class="flex-1 bg-blue-700 hover:bg-blue-600 rounded text-sm py-1">Apply</button>
                </div>
                <div class="grid grid-cols-2 gap-1 text-xs">
                    <span>Col Span: <span id="colSpanDisplay">1</span></span>
                    <span>Row Span: <span id="rowSpanDisplay">1</span></span>
                </div>
                <button id="deleteItemBtn" class="w-full bg-red-900/60 hover:bg-red-800 text-white text-sm py-1.5 rounded"><i class="fas fa-trash-alt"></i> Delete</button>
            </div>
            <div id="noSelectionMsg" class="text-gray-500 text-xs italic">No item selected</div>
        </div>
        <button id="addItemHintBtn" class="text-xs text-blue-300 mt-1 hover:underline"><i class="far fa-lightbulb"></i> Click/drag empty area to create item</button>
    </div>

    <!-- RIGHT: CANVAS AREA (infinite pan/zoom) -->
    <div class="flex-1 relative bg-[#0e131f] overflow-hidden" id="canvasContainer">
        <div id="canvasViewport" class="canvas-viewport w-full h-full">
            <div id="canvasTransform" class="canvas-transform w-full h-full">
                <div id="gridStage" class="grid-stage relative" style="display: grid; width: max-content; min-width: 100%; min-height: 100%;">
                    <!-- grid items will be appended here dynamically -->
                </div>
                <canvas id="gridOverlayCanvas" class="grid-overlay-canvas"></canvas>
            </div>
        </div>
        <!-- Resize handles container (absolute relative to viewport) -->
        <div id="resizeHandlesContainer" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 25;"></div>
    </div>
</div>

<!-- EXPORT MODAL (hidden) -->
<div id="exportModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 border border-gray-600 p-6 rounded-2xl w-[700px] max-h-[80vh] overflow-auto shadow-2xl">
        <h3 class="text-xl mb-3 flex items-center"><i class="fas fa-file-export mr-2"></i>Export Layout</h3>
        <div class="grid grid-cols-2 gap-4">
            <div><p class="font-mono text-xs mb-1">HTML</p><textarea id="exportHtml" class="w-full h-48 bg-gray-950 text-green-300 p-3 rounded text-xs font-mono"></textarea></div>
            <div><p class="font-mono text-xs mb-1">CSS</p><textarea id="exportCss" class="w-full h-48 bg-gray-950 text-blue-300 p-3 rounded text-xs font-mono"></textarea></div>
        </div>
        <div class="flex justify-end mt-5 gap-3">
            <button id="closeModal" class="px-5 py-2 bg-gray-700 rounded-lg">Close</button>
            <button id="copyExport" class="px-5 py-2 bg-blue-700 rounded-lg"><i class="far fa-copy"></i> Copy CSS+HTML</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- GLOBAL STATE ----------
        const state = {
            columns: ['1fr', '1fr', '1fr'],
            rows: ['150px', '150px', '150px'],
            gap: 12,
            gapUnit: 'px',
            items: [],
            snap: true,
            showGridLines: true,
            lineColor: '#3b82f6',
            lineStyle: 'solid',
            zoom: 1.0,
            panX: 0, panY: 0,
            selectedItemId: null,
            breakpoint: 'desktop',
        };

        // DOM elements
        const gridStage = document.getElementById('gridStage');
        const overlayCanvas = document.getElementById('gridOverlayCanvas');
        const canvasTransform = document.getElementById('canvasTransform');
        const viewport = document.getElementById('canvasViewport');
        const handlesContainer = document.getElementById('resizeHandlesContainer');
        
        // UI elements
        const columnsInput = document.getElementById('columnsInput');
        const rowsInput = document.getElementById('rowsInput');
        const gapInput = document.getElementById('gapInput');
        const gapUnit = document.getElementById('gapUnit');
        const snapToggle = document.getElementById('snapToggle');
        const gridLinesToggle = document.getElementById('gridLinesToggle');
        const lineColorPicker = document.getElementById('lineColorPicker');
        const lineStyleSelect = document.getElementById('lineStyleSelect');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const itemEditor = document.getElementById('itemEditor');
        const noSelectionMsg = document.getElementById('noSelectionMsg');
        const itemContentInput = document.getElementById('itemContentInput');
        const itemBgColor = document.getElementById('itemBgColor');
        const colSpanDisplay = document.getElementById('colSpanDisplay');
        const rowSpanDisplay = document.getElementById('rowSpanDisplay');

        // Interaction flags
        let isPanning = false, panStart = { x:0, y:0 }, startPanX=0, startPanY=0;
        let isCreating = false, createStartCell = null, createEndCell = null;
        let dragItem = null, dragOffsetCell = { col:0, row:0 }, dragStartCol=0, dragStartRow=0;
        let resizing = null, resizeDir = null, resizeStartRect = null;

        // ---------- UTILS ----------
        function parseTemplate(str) { return str.trim().split(/\s+/).filter(Boolean); }
        function buildGridStyle() {
            const colStr = state.columns.join(' ');
            const rowStr = state.rows.join(' ');
            gridStage.style.gridTemplateColumns = colStr;
            gridStage.style.gridTemplateRows = rowStr;
            gridStage.style.gap = state.gap + state.gapUnit;
        }
        function getCellFromPixel(clientX, clientY) {
            const rect = gridStage.getBoundingClientRect();
            if (!rect) return null;
            const scale = state.zoom;
            const x = (clientX - rect.left) / scale;
            const y = (clientY - rect.top) / scale;
            const cols = state.columns.length, rows = state.rows.length;
            const colWidths = getComputedGridSizes('columns');
            const rowHeights = getComputedGridSizes('rows');
            let col = 0, row = 0;
            let acc = 0;
            for (let i=0; i<cols; i++) { acc += colWidths[i]; if (x < acc) { col = i; break; } if(i===cols-1) col = cols-1; }
            acc = 0;
            for (let i=0; i<rows; i++) { acc += rowHeights[i]; if (y < acc) { row = i; break; } if(i===rows-1) row = rows-1; }
            return { col, row };
        }
        function getComputedGridSizes(type) {
            const style = window.getComputedStyle(gridStage);
            const template = type==='columns' ? style.gridTemplateColumns : style.gridTemplateRows;
            return template.split(' ').map(s => parseFloat(s) || 0);
        }
        function snapToGrid(clientX, clientY) {
            const cell = getCellFromPixel(clientX, clientY);
            return cell;
        }
        function renderItems() {
            gridStage.innerHTML = '';
            state.items.forEach(item => {
                const el = createItemElement(item);
                gridStage.appendChild(el);
            });
            if (state.selectedItemId) {
                const selectedEl = document.querySelector(`.grid-item[data-id="${state.selectedItemId}"]`);
                if(selectedEl) selectedEl.classList.add('selected');
                updateItemEditor();
            } else {
                itemEditor.classList.add('hidden');
                noSelectionMsg.classList.remove('hidden');
            }
            drawGridOverlay();
        }
        function createItemElement(item) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.setAttribute('data-id', item.id);
            div.style.gridColumn = `${item.colStart} / span ${item.colSpan}`;
            div.style.gridRow = `${item.rowStart} / span ${item.rowSpan}`;
            div.style.backgroundColor = item.bgColor;
            div.textContent = item.content;
            div.setAttribute('contenteditable', 'false');
            div.addEventListener('dblclick', (e) => { e.stopPropagation(); enableInlineEdit(div); });
            return div;
        }
        function enableInlineEdit(el) {
            el.setAttribute('contenteditable', 'true');
            el.focus();
            const onBlur = () => { el.setAttribute('contenteditable', 'false'); updateItemFromElement(el); };
            el.addEventListener('blur', onBlur, { once: true });
        }
        function updateItemFromElement(el) {
            const id = el.dataset.id;
            const item = state.items.find(it => it.id === id);
            if(item) { item.content = el.textContent; }
        }
        function drawGridOverlay() {
            if(!state.showGridLines) { overlayCanvas.style.display = 'none'; return; }
            overlayCanvas.style.display = 'block';
            const ctx = overlayCanvas.getContext('2d');
            const rect = gridStage.getBoundingClientRect();
            overlayCanvas.width = rect.width;
            overlayCanvas.height = rect.height;
            const scale = state.zoom;
            ctx.clearRect(0,0,rect.width, rect.height);
            const colSizes = getComputedGridSizes('columns');
            const rowSizes = getComputedGridSizes('rows');
            ctx.beginPath();
            ctx.strokeStyle = state.lineColor;
            ctx.lineWidth = Math.max(1.5, 2 / scale);
            if(state.lineStyle==='dashed') ctx.setLineDash([6,4]);
            else if(state.lineStyle==='dotted') ctx.setLineDash([2,4]);
            else ctx.setLineDash([]);
            let x=0;
            colSizes.forEach((w,i) => { if(i>0) { ctx.moveTo(x,0); ctx.lineTo(x,rect.height); } x+=w; });
            let y=0;
            rowSizes.forEach((h,i) => { if(i>0) { ctx.moveTo(0,y); ctx.lineTo(rect.width,y); } y+=h; });
            ctx.stroke();
        }

        // ---------- DRAG & RESIZE ----------
        function startDragItem(e, itemEl) {
            e.preventDefault(); if(!state.snap) return;
            const id = itemEl.dataset.id;
            const item = state.items.find(it=>it.id===id);
            if(!item) return;
            const cell = getCellFromPixel(e.clientX, e.clientY);
            if(!cell) return;
            dragItem = item;
            dragOffsetCell.col = cell.col - (item.colStart-1);
            dragOffsetCell.row = cell.row - (item.rowStart-1);
            dragStartCol = item.colStart; dragStartRow = item.rowStart;
            selectItem(id);
        }
        function onMouseMove(e) {
            if(dragItem && state.snap) {
                const cell = getCellFromPixel(e.clientX, e.clientY);
                if(cell) {
                    let newCol = Math.max(1, cell.col + 1 - dragOffsetCell.col);
                    let newRow = Math.max(1, cell.row + 1 - dragOffsetCell.row);
                    newCol = Math.min(newCol, state.columns.length - dragItem.colSpan + 1);
                    newRow = Math.min(newRow, state.rows.length - dragItem.rowSpan + 1);
                    dragItem.colStart = newCol; dragItem.rowStart = newRow;
                    renderItems(); drawGridOverlay();
                }
            } else if(resizing) {
                const cell = getCellFromPixel(e.clientX, e.clientY);
                if(cell && resizeStartRect) {
                    let newColSpan = resizeStartRect.colSpan, newRowSpan = resizeStartRect.rowSpan;
                    if(resizeDir.includes('e')) newColSpan = Math.max(1, cell.col - resizeStartRect.colStart + 2);
                    if(resizeDir.includes('w')) { const diff = resizeStartRect.colStart - cell.col; newColSpan = resizeStartRect.colSpan + diff; }
                    // similar for rows (simplified)
                    const item = state.items.find(i=>i.id===resizing);
                    if(item) { item.colSpan = Math.min(newColSpan, state.columns.length - item.colStart + 1); }
                    renderItems();
                }
            } else if(isCreating) {
                const cell = getCellFromPixel(e.clientX, e.clientY);
                if(cell) createEndCell = cell;
                // preview not implemented fully but we'll create on up
            }
            drawGridOverlay();
        }
        function onMouseUp(e) {
            if(isCreating && createStartCell && createEndCell) {
                const c1=createStartCell, c2=createEndCell;
                const colStart = Math.min(c1.col, c2.col)+1;
                const rowStart = Math.min(c1.row, c2.row)+1;
                const colSpan = Math.abs(c1.col - c2.col)+1;
                const rowSpan = Math.abs(c1.row - c2.row)+1;
                addItem({colStart, rowStart, colSpan, rowSpan});
            }
            dragItem = null; resizing = null; isCreating = false;
        }

        function addItem({colStart, rowStart, colSpan, rowSpan}) {
            const id = 'item-'+Date.now()+'-'+Math.random().toString(36);
            const newItem = { id, colStart, rowStart, colSpan, rowSpan, content: 'Item', bgColor: '#2d8cff' };
            state.items.push(newItem);
            selectItem(id);
            renderItems();
        }

        function selectItem(id) {
            state.selectedItemId = id;
            renderItems();
            updateItemEditor();
            showResizeHandles(id);
        }
        function showResizeHandles(id) {
            handlesContainer.innerHTML = '';
            const el = document.querySelector(`.grid-item[data-id="${id}"]`);
            if(!el) return;
            const rect = el.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            const pos = (dir, l,t,w,h) => {
                const handle = document.createElement('div'); handle.className = `resize-handle handle-${dir}`;
                handle.style.left = (rect.left - viewportRect.left + (dir.includes('e')?rect.width:0) -7)+'px';
                handle.style.top = (rect.top - viewportRect.top + (dir.includes('s')?rect.height:0) -7)+'px';
                handle.addEventListener('mousedown', (e)=> startResize(e, id, dir));
                handlesContainer.appendChild(handle);
            };
            pos('nw',0,0); pos('ne',0,0); pos('sw',0,0); pos('se',0,0);
        }
