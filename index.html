<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefs Linktree</title>
    <!-- Menghubungkan Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reset dasar */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kotak utama */
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        /* Profil */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3436;
            margin: 10px 0;
        }

        .bio {
            font-size: 0.95rem;
            color: #636e72;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Tautan (Link) */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: white;
            background: #2d3436;
        }

        .link-item i {
            font-size: 1.5rem;
        }

        .link-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Warna spesifik untuk Discord */
        .discord {
            background: #5865F2;
        }

        .discord:hover {
            background: #4752C4;
        }

        /* Warna spesifik untuk Sociabuzz */
        .sociabuzz {
            background: #E1306C;
        }

        .sociabuzz:hover {
            background: #C4205A;
        }

        /* Catatan kaki */
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Ganti URL gambar profil dengan milikmu -->
        <img src="https://i.ibb.co.com/5xM0NmFM/file-00000000af887208a1bbb09007ccd32f.png" alt="Foto Profil" class="profile-pic">
        <h1 class="name">Nefs</h1>
        <p class="bio">
            welcome to my linktree.
        </p>

        <div class="link-list">
            <!-- Tautan 1: Discord -->
            <a href="https://discord.gg/vBsxJrMUum" target="_blank" class="link-item discord">
                <i class="fab fa-discord"></i>
                Kj Tavern
            </a>
            <!-- Tautan 2: Sociabuzz -->
            <a href="https://sociabuzz.com/kece8358/tribe" target="_blank" class="link-item sociabuzz">
                <i class="fas fa-mug-hot"></i>
                Dukung di Sociabuzz
            </a>
        </div>

        <div class="footer">
            Dibuat dengan ❤️ oleh Nefs
        </div>
    </div>
</body>
</html>
