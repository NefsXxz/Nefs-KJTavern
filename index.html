<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GridCraft • Advanced CSS Grid Builder</title>
  <!-- TailwindCSS + minimal custom -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0b0f17; }
    /* custom smooth scroll & selection */
    .no-select { user-select: none; -webkit-user-select: none; }
    .grid-stage { position: relative; background: #0f1420; border-radius: 24px; box-shadow: 0 20px 40px -8px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.03); }
    .grid-canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 5; }
    .items-layer { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; }
    .grid-item { position: absolute; background: rgba(59, 130, 246, 0.85); backdrop-filter: blur(4px); border-radius: 12px; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.5), 0 0 0 1.5px rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-weight: 500; cursor: grab; transition: box-shadow 0.15s, background 0.1s; min-width: 40px; min-height: 40px; padding: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }
    .grid-item:active { cursor: grabbing; box-shadow: 0 0 0 3px #3b82f6, 0 12px 28px -8px black; background: #2563eb; }
    .grid-item .resize-handle { position: absolute; bottom: 4px; right: 4px; width: 16px; height: 16px; background: white; border-radius: 6px; opacity: 0.7; cursor: nwse-resize; border: 1.5px solid #1e293b; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: opacity 0.1s; z-index: 20; }
    .grid-item:hover .resize-handle { opacity: 1; }
    .control-panel { background: #111827e0; backdrop-filter: blur(16px); border-left: 1px solid #2d3a5e; box-shadow: -8px 0 30px -12px black; }
    input, select, button { transition: all 0.15s; }
    .glass-input { background: #1e293b; border: 1px solid #334155; color: white; }
    .glass-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px #1e3a8a80; outline: none; }
    /* zoom transform origin */
    .zoom-container { transform-origin: 0 0; transition: transform 0.1s ease-out; will-change: transform; }
    .resize-grip { position: absolute; bottom: 8px; right: 8px; width: 24px; height: 24px; background: #3b82f6; border-radius: 8px; cursor: nwse-resize; z-index: 30; opacity: 0.6; backdrop-filter: blur(4px); border: 1px solid white; }
    .resize-grip:hover { opacity: 1; }
  </style>
</head>
<body class="m-0 p-0 text-gray-200 antialiased h-screen w-screen overflow-hidden flex flex-col">

<!-- main layout: flex row -->
<div class="flex flex-1 overflow-hidden relative">

  <!-- LEFT: canvas area (interactive grid) -->
  <div class="flex-1 relative p-4 md:p-6 flex items-center justify-center overflow-auto bg-[#070b14]">
    <!-- outer wrapper for zoom & scroll -->
    <div class="relative w-full h-full flex items-center justify-center" id="canvasOuter">
      <!-- zoom container (scale) -->
      <div id="zoomWrapper" class="zoom-container relative shadow-2xl" style="transform: scale(1);">
        <!-- GRID STAGE with fixed aspect? flexible -->
        <div id="gridStage" class="grid-stage no-select relative" style="width: 600px; height: 400px; transition: width 0.05s, height 0.05s;">
          <!-- canvas for grid lines (drawn by JS) -->
          <canvas id="gridLineCanvas" class="grid-canvas"></canvas>
          <!-- items container (absolute divs) -->
          <div id="itemsContainer" class="items-layer"></div>
          <!-- resize grip for canvas resizing -->
          <div id="canvasResizeGrip" class="resize-grip" title="Drag to resize grid canvas"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Control Panel Sidebar -->
  <div class="control-panel w-80 md:w-96 flex flex-col p-5 gap-4 overflow-y-auto text-sm shadow-2xl z-20">
    <h2 class="text-xl font-bold tracking-tight flex items-center gap-2 text-white/90 mb-1"><span class="w-2 h-6 bg-blue-500 rounded-full"></span>Grid Builder</h2>
    
    <!-- GRID DIMENSIONS -->
    <div class="space-y-3">
      <div class="flex gap-2">
        <div class="flex-1"><label class="block text-xs uppercase tracking-wider text-gray-400">Columns</label><input id="colCount" type="number" min="1" max="24" value="4" class="w-full glass-input rounded-lg px-3 py-2 text-sm"></div>
        <div class="flex-1"><label class="block text-xs uppercase tracking-wider text-gray-400">Rows</label><input id="rowCount" type="number" min="1" max="24" value="3" class="w-full glass-input rounded-lg px-3 py-2 text-sm"></div>
      </div>
      <div class="flex gap-2">
        <div class="flex-1"><label class="block text-xs text-gray-400">Col width</label><div class="flex"><input id="colWidthVal" type="number" value="1" step="0.1" min="0.1" class="w-16 glass-input rounded-l-lg px-2 py-2"><select id="colUnit" class="glass-input rounded-r-lg px-1 py-2 bg-[#1e293b]"><option value="fr" selected>fr</option><option value="px">px</option><option value="%">%</option></select></div></div>
        <div class="flex-1"><label class="block text-xs text-gray-400">Row height</label><div class="flex"><input id="rowHeightVal" type="number" value="1" step="0.1" min="0.1" class="w-16 glass-input rounded-l-lg px-2 py-2"><select id="rowUnit" class="glass-input rounded-r-lg px-1 py-2"><option value="fr" selected>fr</option><option value="px">px</option><option value="%">%</option></select></div></div>
      </div>
      <div><label class="block text-xs text-gray-400">Gap (px)</label><input id="gridGap" type="number" value="8" min="0" max="60" class="w-full glass-input rounded-lg px-3 py-2"></div>
    </div>

    <!-- VISUAL CONTROLS -->
    <div class="space-y-2 border-t border-white/10 pt-3">
      <div class="flex items-center justify-between"><span class="text-gray-300">Show grid lines</span><input id="showGridToggle" type="checkbox" checked class="w-5 h-5 accent-blue-500"></div>
      <div class="grid grid-cols-2 gap-2">
        <div><label class="text-xs">Line color</label><input id="lineColor" type="color" value="#3b82f6" class="w-full h-8 rounded bg-transparent"></div>
        <div><label class="text-xs">Thickness</label><input id="lineWidth" type="range" min="0.5" max="5" step="0.5" value="1.5" class="w-full"></div>
      </div>
      <div><label class="text-xs">Line style</label><select id="lineStyle" class="w-full glass-input rounded-lg px-3 py-2"><option value="solid">Solid</option><option value="dashed">Dashed</option></select></div>
    </div>

    <!-- SNAP & BEHAVIOR -->
    <div class="space-y-3 border-t border-white/10 pt-3">
      <div class="flex items-center justify-between"><span class="text-gray-300">Snap to grid</span><input id="snapToggle" type="checkbox" checked class="w-5 h-5 accent-blue-500"></div>
      <div><label class="text-xs flex justify-between"><span>Zoom</span><span id="zoomValue">100%</span></label><input id="zoomSlider" type="range" min="0.5" max="2.0" step="0.05" value="1.0" class="w-full"></div>
      <div><label class="text-xs">Grid background</label><input id="bgColor" type="color" value="#0f1420" class="w-full h-8 rounded"></div>
    </div>

    <!-- ACTIONS & UTILS -->
    <div class="flex flex-wrap gap-2 border-t border-white/10 pt-4">
      <button id="addItemBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-sm font-medium flex-1 shadow-lg">➕ Add Item</button>
      <button id="resetGridBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-xl text-sm">⟲ Reset</button>
      <button id="clearItemsBtn" class="bg-gray-700/60 hover:bg-gray-600 px-3 py-2 rounded-xl text-sm">🗑 Clear</button>
    </div>
    <div class="flex gap-2">
      <button id="exportHTML" class="bg-indigo-600/80 hover:bg-indigo-600 px-4 py-2 rounded-xl text-sm flex-1">📤 Export HTML+CSS</button>
      <button id="undoBtn" class="bg-gray-800 px-4 py-2 rounded-xl text-sm" title="Undo">↩️</button>
      <button id="redoBtn" class="bg-gray-800 px-4 py-2 rounded-xl text-sm" title="Redo">↪️</button>
    </div>
    <p class="text-[10px] text-gray-500 mt-2 text-center">Drag items • Resize from corner • Snap optional</p>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM elements ----------
    const stage = document.getElementById('gridStage');
    const canvas = document.getElementById('gridLineCanvas');
    const itemsLayer = document.getElementById('itemsContainer');
    const zoomWrapper = document.getElementById('zoomWrapper');
    const colCountInput = document.getElementById('colCount');
    const rowCountInput = document.getElementById('rowCount');
    const colWidthVal = document.getElementById('colWidthVal');
    const colUnit = document.getElementById('colUnit');
    const rowHeightVal = document.getElementById('rowHeightVal');
    const rowUnit = document.getElementById('rowUnit');
    const gridGapInput = document.getElementById('gridGap');
    const showGridToggle = document.getElementById('showGridToggle');
    const lineColor = document.getElementById('lineColor');
    const lineWidth = document.getElementById('lineWidth');
    const lineStyle = document.getElementById('lineStyle');
    const snapToggle = document.getElementById('snapToggle');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomSpan = document.getElementById('zoomValue');
    const bgColorInput = document.getElementById('bgColor');
    const addItemBtn = document.getElementById('addItemBtn');
    const resetGridBtn = document.getElementById('resetGridBtn');
    const clearItemsBtn = document.getElementById('clearItemsBtn');
    const exportHTMLBtn = document.getElementById('exportHTML');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const resizeGrip = document.getElementById('canvasResizeGrip');

    // ---------- State ----------
    let gridItems = [];               // each: { id, colStart, rowStart, colSpan, rowSpan, text, bg }
    let nextId = 1000;
    let columns = 4, rows = 3;
    let colTemplate = ['1fr','1fr','1fr','1fr'];  // parsed from inputs
    let rowTemplate = ['1fr','1fr','1fr'];
    let gap = 8;
    let snapEnabled = true;
    let showGrid = true;
    let gridLineColor = '#3b82f6';
    let gridLineWidth = 1.5;
    let gridLineDash = false;
    let zoom = 1.0;
    let stageWidth = 600, stageHeight = 400;
    
    // history (undo/redo)
    let history = [];
    let historyIndex = -1;
    const MAX_HISTORY = 30;

    // drag state
    let dragMode = null; // 'move', 'resize', 'canvas-resize'
    let activeItemId = null;
    let dragStart = { x:0, y:0 };
    let itemStartState = null; // for move/resize
    let isDragging = false;
    let resizeDirection = null;

    // ---------- Helper: compute actual pixel sizes for columns/rows ----------
    function parseTemplateValue(val, unit) {
      if (unit === 'fr') return val + 'fr';
      if (unit === 'px') return val + 'px';
      return val + '%';
    }

    function buildTemplates() {
      const colVal = parseFloat(colWidthVal.value) || 1;
      const rowVal = parseFloat(rowHeightVal.value) || 1;
      const cUnit = colUnit.value;
      const rUnit = rowUnit.value;
      const colStr = parseTemplateValue(colVal, cUnit);
      const rowStr = parseTemplateValue(rowVal, rUnit);
      colTemplate = Array(columns).fill(colStr);
      rowTemplate = Array(rows).fill(rowStr);
    }

    function applyGridStyles() {
      buildTemplates();
      stage.style.display = 'grid';
      stage.style.gridTemplateColumns = colTemplate.join(' ');
      stage.style.gridTemplateRows = rowTemplate.join(' ');
      stage.style.gap = gap + 'px';
      stage.style.backgroundColor = bgColorInput.value;
      // force repaint
    }

    // Get computed column/row positions in pixels (relative to stage)
    function getGridMetrics() {
      const rect = stage.getBoundingClientRect();
      const style = getComputedStyle(stage);
      const gridCols = style.gridTemplateColumns.split(' ').map(s => parseFloat(s) || 0);
      const gridRows = style.gridTemplateRows.split(' ').map(s => parseFloat(s) || 0);
      const gaps = (gap * (columns-1));
      const totalColWidth = gridCols.reduce((a,b) => a+b, 0);
      const totalRowHeight = gridRows.reduce((a,b) => a+b, 0);
      
      // compute actual px per fr? using rect width
      const availableWidth = rect.width;
      const availableHeight = rect.height;
      
      let colPx = [];
      let rowPx = [];
      let frSumCol = 0, fixedCol = 0;
      gridCols.forEach((v,i) => { if (colTemplate[i].endsWith('fr')) frSumCol += v; else fixedCol += v; });
      const frWidth = (availableWidth - fixedCol - gaps) / (frSumCol || 1);
      gridCols.forEach((v,i) => {
        if (colTemplate[i].endsWith('fr')) colPx.push(v * frWidth);
        else colPx.push(v);
      });
      
      let frSumRow = 0, fixedRow = 0;
      gridRows.forEach((v,i) => { if (rowTemplate[i].endsWith('fr')) frSumRow += v; else fixedRow += v; });
      const frHeight = (availableHeight - fixedRow - gaps*(rows-1)) / (frSumRow || 1);
      gridRows.forEach((v,i) => {
        if (rowTemplate[i].endsWith('fr')) rowPx.push(v * frHeight);
        else rowPx.push(v);
      });
      
      // cumulative positions
      let colStarts = [0];
      for (let i=0; i<colPx.length; i++) colStarts.push(colStarts[i] + colPx[i] + (i<colPx.length-1 ? gap : 0));
      let rowStarts = [0];
      for (let i=0; i<rowPx.length; i++) rowStarts.push(rowStarts[i] + rowPx[i] + (i<rowPx.length-1 ? gap : 0));
      
      return { colStarts, rowStarts, colPx, rowPx, rect };
    }

    // Draw grid lines on canvas
    function drawGridLines() {
      if (!showGrid) { canvas.style.display = 'none'; return; }
      canvas.style.display = 'block';
      const ctx = canvas.getContext('2d');
      const rect = stage.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      const metrics = getGridMetrics();
      const { colStarts, rowStarts } = metrics;
      
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.beginPath();
      ctx.strokeStyle = gridLineColor;
      ctx.lineWidth = gridLineWidth;
      if (gridLineDash) ctx.setLineDash([6,6]); else ctx.setLineDash([]);
      
      // vertical lines
      colStarts.forEach(x => {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
      });
      // horizontal
      rowStarts.forEach(y => {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
      });
      ctx.stroke();
    }

    // Snap coordinate to grid lines
    function snapToGrid(value, gridLines) {
      if (!snapEnabled) return value;
      let minDist = Infinity, snapped = value;
      gridLines.forEach(line => {
        const dist = Math.abs(value - line);
        if (dist < minDist && dist < 15) { minDist = dist; snapped = line; }
      });
      return snapped;
    }

    // Update item positions from grid spans
    function renderItems() {
      itemsLayer.innerHTML = '';
      const metrics = getGridMetrics();
      const { colStarts, rowStarts } = metrics;
      
      gridItems.forEach(item => {
        const colStart = Math.min(item.colStart, columns);
        const rowStart = Math.min(item.rowStart, rows);
        const colSpan = Math.min(item.colSpan, columns - colStart + 1);
        const rowSpan = Math.min(item.rowSpan, rows - rowStart + 1);
        const left = colStarts[colStart-1] || 0;
        const top = rowStarts[rowStart-1] || 0;
        const width = (colStarts[colStart+colSpan-1] - left) || 50;
        const height = (rowStarts[rowStart+rowSpan-1] - top) || 50;
        
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.style.left = left + 'px';
        div.style.top = top + 'px';
        div.style.width = width + 'px';
        div.style.height = height + 'px';
        div.style.backgroundColor = item.bg || '#3b82f6cc';
        div.textContent = item.text || 'Item';
        div.dataset.id = item.id;
        
        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.dataset.id = item.id;
        div.appendChild(handle);
        
        // Drag start for move
        div.addEventListener('mousedown', onItemMouseDown);
        div.addEventListener('touchstart', onItemTouchStart, {passive: false});
        // resize handle
        handle.addEventListener('mousedown', onResizeHandleDown);
        handle.addEventListener('touchstart', onResizeHandleTouch, {passive: false});
        
        itemsLayer.appendChild(div);
      });
    }

    // Full refresh
    function refreshGrid() {
      applyGridStyles();
      drawGridLines();
      renderItems();
    }

    // history push
    function pushHistory() {
      const snapshot = gridItems.map(item => ({...item}));
      history = history.slice(0, historyIndex+1);
      history.push(snapshot);
      if (history.length > MAX_HISTORY) history.shift();
      historyIndex = history.length-1;
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        gridItems = history[historyIndex].map(i => ({...i}));
        refreshGrid();
      }
    }
    function redo() {
      if (historyIndex < history.length-1) {
        historyIndex++;
        gridItems = history[historyIndex].map(i => ({...i}));
        refreshGrid();
      }
    }

    // Add item
    function addNewItem() {
      pushHistory();
      const id = nextId++;
      gridItems.push({
        id, colStart: 1, rowStart: 1, colSpan: 2, rowSpan: 1,
        text: 'New', bg: '#3b82f6'
      });
      refreshGrid();
    }

    // Clear items
    function clearItems() {
      pushHistory();
      gridItems = [];
      refreshGrid();
    }

    // Reset to default
    function resetToDefault() {
      columns = 4; rows = 3;
      colCountInput.value = 4; rowCountInput.value = 3;
      colWidthVal.value = 1; colUnit.value = 'fr';
      rowHeightVal.value = 1; rowUnit.value = 'fr';
      gridGapInput.value = 8; gap = 8;
      stageWidth = 600; stageHeight = 400;
      stage.style.width = stageWidth+'px'; stage.style.height = stageHeight+'px';
      zoom = 1.0; zoomSlider.value = '1.0'; zoomSpan.textContent = '100%';
      zoomWrapper.style.transform = `scale(${zoom})`;
      pushHistory();
      gridItems = [
        { id: nextId++, colStart:1, rowStart:1, colSpan:2, rowSpan:1, text:'Hero', bg:'#2563eb' },
        { id: nextId++, colStart:3, rowStart:1, colSpan:2, rowSpan:2, text:'Side', bg:'#7c3aed' },
      ];
      refreshGrid();
    }

    // ---------- Event handlers: drag & resize ----------
    function getGridLinesFromMetrics() {
      const m = getGridMetrics();
      return { colLines: m.colStarts, rowLines: m.rowStarts };
    }

    function onItemMouseDown(e) {
      if (e.button !== 0) return;
      const div = e.currentTarget;
      const id = Number(div.dataset.id);
      startDragMove(id, e.clientX, e.clientY);
      e.preventDefault();
    }
    function onItemTouchStart(e) {
      e.preventDefault();
      const touch = e.touches[0];
      const div = e.currentTarget;
      startDragMove(Number(div.dataset.id), touch.clientX, touch.clientY);
    }
    function onResizeHandleDown(e) {
      e.stopPropagation();
      const handle = e.currentTarget;
      const id = Number(handle.dataset.id);
      startResize(id, e.clientX, e.clientY);
      e.preventDefault();
    }
    function onResizeHandleTouch(e) {
      e.preventDefault();
      e.stopPropagation();
      const touch = e.touches[0];
      const handle = e.currentTarget;
      startResize(Number(handle.dataset.id), touch.clientX, touch.clientY);
    }

    function startDragMove(id, clientX, clientY) {
      dragMode = 'move';
      activeItemId = id;
      const item = gridItems.find(i => i.id === id);
      if (!item) return;
      itemStartState = { colStart: item.colStart, rowStart: item.rowStart };
      dragStart = { x: clientX, y: clientY };
      isDragging = true;
      window.addEventListener('mousemove', onGlobalMove);
      window.addEventListener('touchmove', onGlobalTouchMove, {passive: false});
      window.addEventListener('mouseup', onGlobalUp);
      window.addEventListener('touchend', onGlobalUp);
    }

    function startResize(id, clientX, clientY) {
      dragMode = 'resize';
      activeItemId = id;
      const item = gridItems.find(i => i.id === id);
      if (!item) return;
      itemStartState = { colSpan: item.colSpan, rowSpan: item.rowSpan };
      dragStart = { x: clientX, y: clientY };
      isDragging = true;
      window.addEventListener('mousemove', onGlobalMove);
      window.addEventListener('touchmove', onGlobalTouchMove, {passive: false});
      window.addEventListener('mouseup', onGlobalUp);
      window.addEventListener('touchend', onGlobalUp);
    }

    function onGlobalMove(e) {
      if (!isDragging || !dragMode) return;
      const clientX = e.clientX, clientY = e.clientY;
      handleDrag(clientX, clientY);
    }
    function onGlobalTouchMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      handleDrag(touch.clientX, touch.clientY);
    }
    function handleDrag(clientX, clientY) {
      if (!activeItemId) return;
      const item = gridItems.find(i => i.id === activeItemId);
      if (!item) return;
      const metrics = getGridMetrics();
      const { colStarts, rowStarts } = metrics;
      
      if (dragMode === 'move') {
        const dx = clientX - dragStart.x;
        const dy = clientY - dragStart.y;
        const itemDiv = document.querySelector(`.grid-item[data-id="${activeItemId}"]`);
        if (!itemDiv) return;
        const left = parseFloat(itemDiv.style.left);
        const top = parseFloat(itemDiv.style.top);
        let newLeft = left + dx;
        let newTop = top + dy;
        // snap
        newLeft = snapToGrid(newLeft, colStarts);
        newTop = snapToGrid(newTop, rowStarts);
        // find closest col/row
        const colIndex = colStarts.findIndex(v => Math.abs(v - newLeft) < 2);
        const rowIndex = rowStarts.findIndex(v => Math.abs(v - newTop) < 2);
        if (colIndex >=0 && rowIndex>=0) {
          item.colStart = colIndex+1;
          item.rowStart = rowIndex+1;
        }
        dragStart = { x: clientX, y: clientY };
        refreshGrid();
      } else if (dragMode === 'resize') {
        const dx = clientX - dragStart.x;
        const dy = clientY - dragStart.y;
        // crude: adjust span
        const metrics2 = getGridMetrics();
        const itemRight = colStarts[item.colStart+item.colSpan-1] || colStarts[colStarts.length-1];
        const itemBottom = rowStarts[item.rowStart+item.rowSpan-1] || rowStarts[rowStarts.length-1];
        let newRight = itemRight + dx;
        let newBottom = itemBottom + dy;
        newRight = snapToGrid(newRight, metrics2.colStarts);
        newBottom = snapToGrid(newBottom, metrics2.rowStarts);
        const colEnd = metrics2.colStarts.findIndex(v => Math.abs(v - newRight) < 2);
        const rowEnd = metrics2.rowStarts.findIndex(v => Math.abs(v - newBottom) < 2);
        if (colEnd >= item.colStart) item.colSpan = colEnd - item.colStart + 1;
        if (rowEnd >= item.rowStart) item.rowSpan = rowEnd - item.rowStart + 1;
        dragStart = { x: clientX, y: clientY };
        refreshGrid();
      }
    }

    function onGlobalUp() {
      if (isDragging) {
        pushHistory();
      }
      isDragging = false; dragMode = null; activeItemId = null;
      window.removeEventListener('mousemove', onGlobalMove);
      window.removeEventListener('touchmove', onGlobalTouchMove);
      window.removeEventListener('mouseup', onGlobalUp);
      window.removeEventListener('touchend', onGlobalUp);
    }

    // canvas resize grip
    function initResizeGrip() {
      let startW, startH, startX, startY;
      function onResizeStart(e) {
        e.preventDefault();
        startW = stageWidth; startH = stageHeight;
        startX = e.clientX; startY = e.clientY;
        window.addEventListener('mousemove', onResizeMove);
        window.addEventListener('mouseup', onResizeEnd);
      }
      function onResizeMove(e) {
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        stageWidth = Math.max(200, startW + dx);
        stageHeight = Math.max(150, startH + dy);
        stage.style.width = stageWidth + 'px';
        stage.style.height = stageHeight + 'px';
        refreshGrid();
      }
      function onResizeEnd() {
        window.removeEventListener('mousemove', onResizeMove);
        window.removeEventListener('mouseup', onResizeEnd);
      }
      resizeGrip.addEventListener('mousedown', onResizeStart);
    }

    // zoom
    function updateZoom(val) {
      zoom = parseFloat(val);
      zoomWrapper.style.transform = `scale(${zoom})`;
      zoomSpan.textContent = Math.round(zoom*100) + '%';
      drawGridLines();
    }

    // Export
    function exportCode() {
      const styles = `display: grid; grid-template-columns: ${colTemplate.join(' ')}; grid-template-rows: ${rowTemplate.join(' ')}; gap: ${gap}px; background: ${bgColorInput.value};`;
      let itemsHtml = '';
      gridItems.forEach(it => {
        itemsHtml += `<div style="grid-column: ${it.colStart} / span ${it.colSpan}; grid-row: ${it.rowStart} / span ${it.rowSpan}; background: ${it.bg}; border-radius: 12px; padding: 8px;">${it.text}</div>`;
      });
      const full = `<!DOCTYPE html><html><head><style>.grid { ${styles} } .item { border-radius:12px; }</style></head><body><div class="grid">${itemsHtml}</div></body></html>`;
      const blob = new Blob([full], {type: 'text/html'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'grid-layout.html'; a.click();
    }

    // bind UI
    function bindControls() {
      colCountInput.addEventListener('input', () => { columns = parseInt(colCountInput.value)||1; refreshGrid(); });
      rowCountInput.addEventListener('input', () => { rows = parseInt(rowCountInput.value)||1; refreshGrid(); });
      [colWidthVal, colUnit, rowHeightVal, rowUnit, gridGapInput].forEach(el => el.addEventListener('input', () => { gap = parseInt(gridGapInput.value)||0; refreshGrid(); }));
      showGridToggle.addEventListener('change', e => { showGrid = e.target.checked; drawGridLines(); });
      lineColor.addEventListener('input', e => { gridLineColor = e.target.value; drawGridLines(); });
      lineWidth.addEventListener('input', e => { gridLineWidth = e.target.value; drawGridLines(); });
      lineStyle.addEventListener('change', e => { gridLineDash = e.target.value === 'dashed'; drawGridLines(); });
      snapToggle.addEventListener('change', e => { snapEnabled = e.target.checked; });
      bgColorInput.addEventListener('input', () => { stage.style.backgroundColor = bgColorInput.value; });
      zoomSlider.addEventListener('input', e => updateZoom(e.target.value));
      addItemBtn.addEventListener('click', addNewItem);
      resetGridBtn.addEventListener('click', resetToDefault);
      clearItemsBtn.addEventListener('click', clearItems);
      exportHTMLBtn.addEventListener('click', exportCode);
      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      window.addEventListener('resize', () => { drawGridLines(); renderItems(); });
    }

    // init
    function init() {
      initResizeGrip();
      bindControls();
      resetToDefault(); // sets initial items
      // observe stage size changes
      const ro = new ResizeObserver(() => { drawGridLines(); renderItems(); });
      ro.observe(stage);
    }
    init();
  })();
</script>
</body>
</html>
